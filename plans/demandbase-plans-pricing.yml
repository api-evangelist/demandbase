specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Demandbase
providerId: demandbase
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: 'Demandbase does not publish self-serve API pricing. Confirmed on https://www.demandbase.com/pricing/:
  pricing is "a clear platform fee that covers all the essential software and services" plus "a flat
  fee per user", scoped to one of three packages (Demandbase One, Advertising, Data). Detailed pricing
  is custom-quoted via sales engagement form. No public per-call API price exists.'
tags:
  - Account-Based Marketing
  - Advertising
  - B2B Marketing
  - Data Enrichment
  - Intent Data
  - Sales Intelligence
description: Demandbase prices its three commercial packages (Demandbase One, Advertising, Data) as a
  platform fee plus per-user flat fee, all custom-quoted. API access is included as part of the platform
  contract rather than priced separately. This artifact retains a single contract-bundled plan stub pending
  direct customer-agreement reconciliation.
sources:
  - https://www.demandbase.com/pricing/
  - https://developer.demandbase.com/
plans:
  - id: demandbase-platform-contract
    name: Demandbase Platform Contract
    type: enterprise
    description: One of three Demandbase packages (Demandbase One, Advertising, or Data) sold as a platform
      fee plus per-user flat fee. API access is included with the underlying subscription.
    entries:
      - label: Platform Fee
        description: Flat platform fee covering Demandbase software and services, custom-quoted per customer.
        name: platform_fee
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        domains:
          - https://api.demandbase.com
          - https://api.company-target.com
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Per-User Fee
        description: Flat fee per platform user; allows scaling seat counts.
        name: per_user_fee
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://api.demandbase.com
        unit: 1
        price: contact sales
        userMultiplied: true
      - label: API Access
        description: API access included as part of the platform subscription; quotas set per contract.
        name: api_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://api.demandbase.com
          - https://api.company-target.com
        unit: 1
        price: included with platform
        userMultiplied: false
    elements:
      - name: Demandbase One package
      - name: Demandbase Advertising package
      - name: Demandbase Data package
      - name: Demandbase Real-Time Identification API
      - name: Demandbase Advertising API
      - name: Demandbase Engagement API
      - name: Demandbase Account List API
      - name: Demandbase B2B Data API
      - name: Demandbase IP API
      - name: Demandbase Admin API
      - name: Demandbase Data Export API
      - name: Demandbase Data Import API
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
    url: https://www.demandbase.com
