naftiko: 1.0.0-alpha2
info:
  label: Demandbase Account List API — List Members
  description: 'Demandbase Account List API — List Members. 3 operations. Lead operation: Demandbase List account list members.
    Self-contained Naftiko capability covering one Demandbase business surface.'
  tags:
  - Demandbase
  - List Members
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEMANDBASE_API_KEY: DEMANDBASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-list-list-members
    baseUri: https://api.demandbase.com/accounts
    description: Demandbase Account List API — List Members business capability. Self-contained, no shared references.
    resources:
    - name: lists-listId-members
      path: /lists/{listId}/members
      operations:
      - name: listaccountlistmembers
        method: GET
        description: Demandbase List account list members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
      - name: addaccountlistmembers
        method: POST
        description: Demandbase Add accounts to list
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: lists-listId-members-accountId
      path: /lists/{listId}/members/{accountId}
      operations:
      - name: removeaccountlistmember
        method: DELETE
        description: Demandbase Remove account from list
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.DEMANDBASE_API_KEY}}'
  exposes:
  - type: rest
    namespace: account-list-list-members-rest
    port: 8080
    description: REST adapter for Demandbase Account List API — List Members. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/lists/{listid}/members
      name: lists-listid-members
      description: REST surface for lists-listId-members.
      operations:
      - method: GET
        name: listaccountlistmembers
        description: Demandbase List account list members
        call: account-list-list-members.listaccountlistmembers
        with:
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addaccountlistmembers
        description: Demandbase Add accounts to list
        call: account-list-list-members.addaccountlistmembers
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lists/{listid}/members/{accountid}
      name: lists-listid-members-accountid
      description: REST surface for lists-listId-members-accountId.
      operations:
      - method: DELETE
        name: removeaccountlistmember
        description: Demandbase Remove account from list
        call: account-list-list-members.removeaccountlistmember
        with:
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-list-list-members-mcp
    port: 9090
    transport: http
    description: MCP adapter for Demandbase Account List API — List Members. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: demandbase-list-account-list-members
      description: Demandbase List account list members
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: account-list-list-members.listaccountlistmembers
      with:
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: demandbase-add-accounts-list
      description: Demandbase Add accounts to list
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-list-list-members.addaccountlistmembers
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: demandbase-remove-account-list
      description: Demandbase Remove account from list
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: account-list-list-members.removeaccountlistmember
      with:
        accountId: tools.accountId
      outputParameters:
      - type: object
        mapping: $.
