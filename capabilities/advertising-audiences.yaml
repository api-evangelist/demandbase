naftiko: 1.0.0-alpha2
info:
  label: Demandbase Advertising API — Audiences
  description: 'Demandbase Advertising API — Audiences. 4 operations. Lead operation: Demandbase List audiences. Self-contained
    Naftiko capability covering one Demandbase business surface.'
  tags:
  - Demandbase
  - Audiences
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEMANDBASE_API_KEY: DEMANDBASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: advertising-audiences
    baseUri: https://api.demandbase.com/advertising
    description: Demandbase Advertising API — Audiences business capability. Self-contained, no shared references.
    resources:
    - name: audiences
      path: /audiences
      operations:
      - name: listaudiences
        method: GET
        description: Demandbase List audiences
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
      - name: createaudience
        method: POST
        description: Demandbase Create an audience
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: audiences-audienceId
      path: /audiences/{audienceId}
      operations:
      - name: getaudience
        method: GET
        description: Demandbase Get an audience
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteaudience
        method: DELETE
        description: Demandbase Delete an audience
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DEMANDBASE_API_KEY}}'
  exposes:
  - type: rest
    namespace: advertising-audiences-rest
    port: 8080
    description: REST adapter for Demandbase Advertising API — Audiences. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/audiences
      name: audiences
      description: REST surface for audiences.
      operations:
      - method: GET
        name: listaudiences
        description: Demandbase List audiences
        call: advertising-audiences.listaudiences
        with:
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createaudience
        description: Demandbase Create an audience
        call: advertising-audiences.createaudience
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/audiences/{audienceid}
      name: audiences-audienceid
      description: REST surface for audiences-audienceId.
      operations:
      - method: GET
        name: getaudience
        description: Demandbase Get an audience
        call: advertising-audiences.getaudience
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteaudience
        description: Demandbase Delete an audience
        call: advertising-audiences.deleteaudience
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: advertising-audiences-mcp
    port: 9090
    transport: http
    description: MCP adapter for Demandbase Advertising API — Audiences. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: demandbase-list-audiences
      description: Demandbase List audiences
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: advertising-audiences.listaudiences
      with:
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: demandbase-create-audience
      description: Demandbase Create an audience
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: advertising-audiences.createaudience
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: demandbase-get-audience
      description: Demandbase Get an audience
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: advertising-audiences.getaudience
      outputParameters:
      - type: object
        mapping: $.
    - name: demandbase-delete-audience
      description: Demandbase Delete an audience
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: advertising-audiences.deleteaudience
      outputParameters:
      - type: object
        mapping: $.
