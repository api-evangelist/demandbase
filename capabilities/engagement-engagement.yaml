naftiko: 1.0.0-alpha2
info:
  label: Demandbase Engagement API — Engagement
  description: 'Demandbase Engagement API — Engagement. 2 operations. Lead operation: Demandbase Get account engagement. Self-contained
    Naftiko capability covering one Demandbase business surface.'
  tags:
  - Demandbase
  - Engagement
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEMANDBASE_API_KEY: DEMANDBASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: engagement-engagement
    baseUri: https://api.demandbase.com/engagement
    description: Demandbase Engagement API — Engagement business capability. Self-contained, no shared references.
    resources:
    - name: accounts-accountId-engagement
      path: /accounts/{accountId}/engagement
      operations:
      - name: getaccountengagement
        method: GET
        description: Demandbase Get account engagement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: start_date
          in: query
          type: string
          description: Start date for engagement data (YYYY-MM-DD)
        - name: end_date
          in: query
          type: string
          description: End date for engagement data (YYYY-MM-DD)
    - name: engagement-summary
      path: /engagement/summary
      operations:
      - name: getengagementsummary
        method: GET
        description: Demandbase Get engagement summary
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: start_date
          in: query
          type: string
        - name: end_date
          in: query
          type: string
        - name: limit
          in: query
          type: integer
          description: Number of top accounts to return
    authentication:
      type: bearer
      token: '{{env.DEMANDBASE_API_KEY}}'
  exposes:
  - type: rest
    namespace: engagement-engagement-rest
    port: 8080
    description: REST adapter for Demandbase Engagement API — Engagement. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounts/{accountid}/engagement
      name: accounts-accountid-engagement
      description: REST surface for accounts-accountId-engagement.
      operations:
      - method: GET
        name: getaccountengagement
        description: Demandbase Get account engagement
        call: engagement-engagement.getaccountengagement
        with:
          start_date: rest.start_date
          end_date: rest.end_date
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/engagement/summary
      name: engagement-summary
      description: REST surface for engagement-summary.
      operations:
      - method: GET
        name: getengagementsummary
        description: Demandbase Get engagement summary
        call: engagement-engagement.getengagementsummary
        with:
          start_date: rest.start_date
          end_date: rest.end_date
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: engagement-engagement-mcp
    port: 9090
    transport: http
    description: MCP adapter for Demandbase Engagement API — Engagement. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: demandbase-get-account-engagement
      description: Demandbase Get account engagement
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: engagement-engagement.getaccountengagement
      with:
        start_date: tools.start_date
        end_date: tools.end_date
      outputParameters:
      - type: object
        mapping: $.
    - name: demandbase-get-engagement-summary
      description: Demandbase Get engagement summary
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: engagement-engagement.getengagementsummary
      with:
        start_date: tools.start_date
        end_date: tools.end_date
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
