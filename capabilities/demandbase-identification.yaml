naftiko: 1.0.0-alpha2
info:
  label: Demandbase API — Identification
  description: 'Demandbase API — Identification. 1 operations. Lead operation: Demandbase Get account by domain. Self-contained
    Naftiko capability covering one Demandbase business surface.'
  tags:
  - Demandbase
  - Identification
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEMANDBASE_API_KEY: DEMANDBASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: demandbase-identification
    baseUri: https://api.demandbase.com
    description: Demandbase API — Identification business capability. Self-contained, no shared references.
    resources:
    - name: accounts-domain-domain
      path: /accounts/domain/{domain}
      operations:
      - name: getaccountbydomain
        method: GET
        description: Demandbase Get account by domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain
          in: path
          type: string
          description: Company web domain (e.g., acme.com)
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.DEMANDBASE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: demandbase-identification-rest
    port: 8080
    description: REST adapter for Demandbase API — Identification. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounts/domain/{domain}
      name: accounts-domain-domain
      description: REST surface for accounts-domain-domain.
      operations:
      - method: GET
        name: getaccountbydomain
        description: Demandbase Get account by domain
        call: demandbase-identification.getaccountbydomain
        with:
          domain: rest.domain
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: demandbase-identification-mcp
    port: 9090
    transport: http
    description: MCP adapter for Demandbase API — Identification. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: demandbase-get-account-domain
      description: Demandbase Get account by domain
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: demandbase-identification.getaccountbydomain
      with:
        domain: tools.domain
      outputParameters:
      - type: object
        mapping: $.
