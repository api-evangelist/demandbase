naftiko: 1.0.0-alpha2
info:
  label: Demandbase Admin API — Roles
  description: 'Demandbase Admin API — Roles. 1 operations. Lead operation: Demandbase List roles. Self-contained Naftiko
    capability covering one Demandbase business surface.'
  tags:
  - Demandbase
  - Roles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEMANDBASE_API_KEY: DEMANDBASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-roles
    baseUri: https://api.demandbase.com
    description: Demandbase Admin API — Roles business capability. Self-contained, no shared references.
    resources:
    - name: admin-v1-roles
      path: /admin/v1/roles
      operations:
      - name: listroles
        method: GET
        description: Demandbase List roles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DEMANDBASE_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-roles-rest
    port: 8080
    description: REST adapter for Demandbase Admin API — Roles. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/admin/v1/roles
      name: admin-v1-roles
      description: REST surface for admin-v1-roles.
      operations:
      - method: GET
        name: listroles
        description: Demandbase List roles
        call: admin-roles.listroles
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-roles-mcp
    port: 9090
    transport: http
    description: MCP adapter for Demandbase Admin API — Roles. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: demandbase-list-roles
      description: Demandbase List roles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-roles.listroles
      outputParameters:
      - type: object
        mapping: $.
