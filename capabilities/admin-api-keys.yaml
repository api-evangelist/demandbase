naftiko: 1.0.0-alpha2
info:
  label: Demandbase Admin API — API Keys
  description: 'Demandbase Admin API — API Keys. 4 operations. Lead operation: Demandbase List API key sets. Self-contained
    Naftiko capability covering one Demandbase business surface.'
  tags:
  - Demandbase
  - API Keys
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEMANDBASE_API_KEY: DEMANDBASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-api-keys
    baseUri: https://api.demandbase.com
    description: Demandbase Admin API — API Keys business capability. Self-contained, no shared references.
    resources:
    - name: admin-v1-api-keys
      path: /admin/v1/api-keys
      operations:
      - name: listapikeys
        method: GET
        description: Demandbase List API key sets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createapikey
        method: POST
        description: Demandbase Create an API key set
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: admin-v1-api-keys-keyId
      path: /admin/v1/api-keys/{keyId}
      operations:
      - name: getapikey
        method: GET
        description: Demandbase Get an API key set
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteapikey
        method: DELETE
        description: Demandbase Delete an API key set
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DEMANDBASE_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-api-keys-rest
    port: 8080
    description: REST adapter for Demandbase Admin API — API Keys. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/admin/v1/api-keys
      name: admin-v1-api-keys
      description: REST surface for admin-v1-api-keys.
      operations:
      - method: GET
        name: listapikeys
        description: Demandbase List API key sets
        call: admin-api-keys.listapikeys
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createapikey
        description: Demandbase Create an API key set
        call: admin-api-keys.createapikey
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/admin/v1/api-keys/{keyid}
      name: admin-v1-api-keys-keyid
      description: REST surface for admin-v1-api-keys-keyId.
      operations:
      - method: GET
        name: getapikey
        description: Demandbase Get an API key set
        call: admin-api-keys.getapikey
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteapikey
        description: Demandbase Delete an API key set
        call: admin-api-keys.deleteapikey
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-api-keys-mcp
    port: 9090
    transport: http
    description: MCP adapter for Demandbase Admin API — API Keys. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: demandbase-list-api-key-sets
      description: Demandbase List API key sets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-api-keys.listapikeys
      outputParameters:
      - type: object
        mapping: $.
    - name: demandbase-create-api-key-set
      description: Demandbase Create an API key set
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-api-keys.createapikey
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: demandbase-get-api-key-set
      description: Demandbase Get an API key set
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-api-keys.getapikey
      outputParameters:
      - type: object
        mapping: $.
    - name: demandbase-delete-api-key-set
      description: Demandbase Delete an API key set
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: admin-api-keys.deleteapikey
      outputParameters:
      - type: object
        mapping: $.
