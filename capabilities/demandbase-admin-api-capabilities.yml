name: Demandbase Admin API Capabilities
description: >-
  Capabilities for managing users, roles, and API keys for a Demandbase One
  workspace.
capabilities:
  - name: List Users
    description: List all users in the Demandbase workspace.
    operationId: listUsers
    method: GET
    path: /admin/v1/users
  - name: Create User
    description: Provision a new user.
    operationId: createUser
    method: POST
    path: /admin/v1/users
  - name: Get User
    description: Retrieve a single user by ID.
    operationId: getUser
    method: GET
    path: /admin/v1/users/{userId}
  - name: Update User
    description: Update user attributes or role.
    operationId: updateUser
    method: PUT
    path: /admin/v1/users/{userId}
  - name: Delete User
    description: Remove a user from the workspace.
    operationId: deleteUser
    method: DELETE
    path: /admin/v1/users/{userId}
  - name: List API Keys
    description: List API keys issued for the workspace.
    operationId: listApiKeys
    method: GET
    path: /admin/v1/api-keys
  - name: Create API Key
    description: Mint a new API key set.
    operationId: createApiKey
    method: POST
    path: /admin/v1/api-keys
  - name: Get API Key
    description: Retrieve metadata about an API key.
    operationId: getApiKey
    method: GET
    path: /admin/v1/api-keys/{keyId}
  - name: Delete API Key
    description: Revoke an API key.
    operationId: deleteApiKey
    method: DELETE
    path: /admin/v1/api-keys/{keyId}
  - name: List Roles
    description: List available roles for assignment to users.
    operationId: listRoles
    method: GET
    path: /admin/v1/roles
use_cases:
  - name: Identity and access management
    description: Centrally provision users and roles for Demandbase One.
  - name: API key lifecycle
    description: Mint, audit, and revoke API keys to control programmatic access.
