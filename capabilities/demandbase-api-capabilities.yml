name: Demandbase API Capabilities
description: >-
  Capabilities exposed by the core Demandbase API for account search,
  retrieval, enrichment, and firmographic lookup.
capabilities:
  - name: Search Accounts
    description: Search accounts by company name, domain, or firmographic attributes.
    operationId: searchAccounts
    method: GET
    path: /accounts/search
  - name: Get Account
    description: Retrieve detailed firmographic data for an account by ID.
    operationId: getAccount
    method: GET
    path: /accounts/{accountId}
  - name: Get Account by Domain
    description: Look up a company account by its web domain.
    operationId: getAccountByDomain
    method: GET
    path: /accounts/domain/{domain}
  - name: Enrich Account
    description: Enrich an account record with firmographic, intent, and technographic data.
    operationId: enrichAccount
    method: POST
    path: /enrichment/account
  - name: Get Firmographics
    description: Return firmographic attributes for a company by domain.
    operationId: getFirmographics
    method: GET
    path: /firmographics/{domain}
use_cases:
  - name: Account-based marketing
    description: Identify and prioritize target accounts based on firmographics and intent signals.
  - name: CRM enrichment
    description: Enrich incoming CRM records with verified firmographic and technographic data.
  - name: Sales intelligence
    description: Power sales workflows with detailed company-level intelligence at the point of contact.
