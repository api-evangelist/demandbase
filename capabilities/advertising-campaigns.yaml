    namespace: advertising-campaigns-rest
    port: 8080
    description: REST adapter for Demandbase Advertising API — Campaigns. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/campaigns
      name: campaigns
      description: REST surface for campaigns.
      operations:
      - method: GET
        name: listcampaigns
        description: Demandbase List campaigns
        call: advertising-campaigns.listcampaigns
        with:
          status: rest.status
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
