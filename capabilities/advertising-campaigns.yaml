naftiko: 1.0.0-alpha2
info:
  label: Demandbase Advertising API — Campaigns
  description: 'Demandbase Advertising API — Campaigns. 5 operations. Lead operation: Demandbase List campaigns. Self-contained
    Naftiko capability covering one Demandbase business surface.'
  tags:
  - Demandbase
  - Campaigns
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
