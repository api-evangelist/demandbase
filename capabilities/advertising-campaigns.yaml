      - name: listcampaigns
        method: GET
        description: Demandbase List campaigns
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter by campaign status
        - name: limit
          in: query
          type: integer
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          description: Pagination offset
      - name: createcampaign
        method: POST
        description: Demandbase Create a campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: campaigns-campaignId
      path: /campaigns/{campaignId}
      operations:
      - name: getcampaign
        method: GET
        description: Demandbase Get a campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatecampaign
