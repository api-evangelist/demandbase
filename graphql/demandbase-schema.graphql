"""HubSpot CRM integration configuration and sync status."""
type HubSpotIntegration {
  id: ID!
  portalId: String!
  connectedAt: DateTime
  syncEnabled: Boolean
  lastSyncAt: DateTime
  syncedObjects: [String]
  fieldMappings: JSON
  status: String
  errorLog: [String]
