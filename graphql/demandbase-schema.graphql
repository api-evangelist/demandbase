"""Marketo marketing automation integration configuration."""
type MarketoIntegration {
  id: ID!
  munchkinId: String!
  instanceUrl: URL!
  connectedAt: DateTime
  syncEnabled: Boolean
  lastSyncAt: DateTime
  syncedPrograms: [String]
  fieldMappings: JSON
  status: String
  errorLog: [String]
