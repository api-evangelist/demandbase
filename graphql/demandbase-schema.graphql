# ─────────────────────────────────────────────
# Auth & Admin Types
# ─────────────────────────────────────────────

"""A Demandbase API key for programmatic access."""
type APIKey {
  id: ID!
  name: String!
  keyPrefix: String!
  scopes: [String]
  createdAt: DateTime!
  expiresAt: DateTime
  lastUsedAt: DateTime
  isActive: Boolean!
  createdBy: String
}

"""An authentication token session."""
type Token {
  accessToken: String!
  tokenType: String!
  expiresIn: Int
  scope: String
  issuedAt: DateTime!
}

# ─────────────────────────────────────────────
# Query Root
# ─────────────────────────────────────────────

type Query {
  # Accounts
  account(id: ID!): Account
  accounts(
    domain: String
    industry: String
    country: String
    employeeRange: String
    revenueRange: String
    limit: Int
    offset: Int
  ): [Account]

  # Intent
  accountIntent(accountId: ID!): Intent
  intentByDomain(domain: String!): Intent
  topIntentAccounts(keyword: String, limit: Int): [Account]

  # Segments
  segment(id: ID!): Segment
  segments(isActive: Boolean, limit: Int, offset: Int): [Segment]
  segmentMembers(segmentId: ID!, limit: Int, offset: Int): [SegmentMember]

  # Audiences
  audience(id: ID!): Audience
  audiences(isActive: Boolean, limit: Int, offset: Int): [Audience]

  # Campaigns
  campaign(id: ID!): Campaign
  campaigns(status: CampaignStatus, type: CampaignType, limit: Int, offset: Int): [Campaign]
  adGroup(id: ID!): AdGroup
  ad(id: ID!): Ad

  # Company Intelligence
  company(id: ID!): Company
  companyByDomain(domain: String!): Company
  companies(industry: String, country: String, employeeRange: String, limit: Int, offset: Int): [Company]
  companyTechnologies(companyId: ID!): CompanyTechnographic
  companyFunding(companyId: ID!): [Funding]
  companyNews(companyId: ID!, limit: Int): [News]

  # Contacts & Leads
  contact(id: ID!): Contact
  contacts(accountId: ID, companyId: ID, role: ContactRole, limit: Int, offset: Int): [Contact]
  lead(id: ID!): Lead
  leads(accountId: ID, status: String, limit: Int, offset: Int): [Lead]

  # Engagement
  accountEngagement(accountId: ID!, period: String): Engagement
  accountVisits(accountId: ID!, limit: Int, offset: Int): [Visit]
  accountPageViews(accountId: ID!, limit: Int, offset: Int): [PageView]
  accountConversations(accountId: ID!, limit: Int, offset: Int): [Conversation]

  # Visitor Intelligence
  visitorByIp(ipAddress: String!): VisitorDetails
  visitor(id: ID!): VisitorDetails

  # Integrations
  salesforceIntegration: SalesforceIntegration
  hubspotIntegration: HubSpotIntegration
  marketoIntegration: MarketoIntegration

  # Admin
  apiKeys: [APIKey]
  apiKey(id: ID!): APIKey
}

# ─────────────────────────────────────────────
# Mutation Root
# ─────────────────────────────────────────────

type Mutation {
  # Segments
  createSegment(name: String!, description: String, filterCriteria: JSON): Segment
  updateSegment(id: ID!, name: String, description: String, filterCriteria: JSON): Segment
  deleteSegment(id: ID!): Boolean
  addAccountToSegment(segmentId: ID!, accountId: ID!): SegmentMember
  removeAccountFromSegment(segmentId: ID!, accountId: ID!): Boolean

  # Audiences
  createAudience(name: String!, description: String, segmentIds: [ID]): Audience
  updateAudience(id: ID!, name: String, description: String): Audience
  deleteAudience(id: ID!): Boolean

  # Campaigns
  createCampaign(name: String!, type: CampaignType!, budget: Float, startDate: DateTime, endDate: DateTime): Campaign
  updateCampaign(id: ID!, name: String, status: CampaignStatus, budget: Float): Campaign
  deleteCampaign(id: ID!): Boolean
  pauseCampaign(id: ID!): Campaign
  resumeCampaign(id: ID!): Campaign

  # Ad Groups & Ads
  createAdGroup(campaignId: ID!, name: String!, budget: Float): AdGroup
  updateAdGroup(id: ID!, name: String, budget: Float, status: String): AdGroup
  createAd(adGroupId: ID!, name: String!, format: String!, clickUrl: URL): Ad
  updateAd(id: ID!, name: String, status: String): Ad

  # Contacts & Leads
  createContact(firstName: String!, lastName: String!, email: String!, accountId: ID): Contact
  updateContact(id: ID!, title: String, role: ContactRole, phone: String): Contact
  deleteContact(id: ID!): Boolean
  createLead(contactId: ID!, accountId: ID, source: String): Lead
  updateLead(id: ID!, status: String, score: Float, assignedTo: String): Lead

  # API Keys
  createAPIKey(name: String!, scopes: [String], expiresAt: DateTime): APIKey
  revokeAPIKey(id: ID!): Boolean

  # Token
  generateToken(apiKey: String!): Token
}
