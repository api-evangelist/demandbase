specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Demandbase
providerId: demandbase
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Demandbase does not publish a public canonical rate-limit table. Limits are configured per customer
  contract on the Demandbase One platform and on the Real-Time Identification API. Headers and response
  codes below are scaffold defaults pending direct doc reconciliation.
tags:
  - Account-Based Marketing
  - Advertising
  - B2B Marketing
  - Data Enrichment
  - Rate Limiting
description: Per-customer rate limits configured during platform onboarding. Real-time identification
  endpoints are tuned per integration to balance latency and protection against scraping. Bulk export
  / import endpoints have separate quota envelopes from real-time endpoints.
sources:
  - https://developer.demandbase.com/
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - tier: customer
    name: Customer-Negotiated Limit
    scope: contract
    metric: varies
    limit: 'set per platform subscription'
    applies:
      - Demandbase Real-Time Identification API
      - Demandbase Advertising API
      - Demandbase Engagement API
      - Demandbase Account List API
      - Demandbase B2B Data API
      - Demandbase IP API
      - Demandbase Admin API
      - Demandbase Data Export API
      - Demandbase Data Import API
policies:
  - name: Per-Subscription Limits
    description: Each Demandbase platform subscription has its own request-rate ceiling configured during
      onboarding; defaults are not published.
  - name: Real-Time vs Bulk
    description: Real-time identification and IP-intelligence endpoints are protected with low-latency
      throttles distinct from bulk export / import jobs that run on separate batch quotas.
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter, honoring Retry-After when present.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
    url: https://www.demandbase.com
