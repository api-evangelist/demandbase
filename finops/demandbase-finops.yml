specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Demandbase
providerId: demandbase
publisherName: Demandbase, Inc.
serviceCategory: B2B Marketing / Sales Intelligence
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: 'Demandbase pricing is platform-fee + per-user with custom-quoted package totals (Demandbase One,
  Advertising, Data) confirmed at https://www.demandbase.com/pricing/. FinOps shape is SaaS subscription;
  advertising spend is a separate pass-through. Reconcile against platform invoice when available.'
tags:
  - Account-Based Marketing
  - Advertising
  - B2B Marketing
  - Data
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Demandbase: SaaS subscription with platform fee plus per-user fee
  per package, plus media-spend pass-through for the Advertising product line.'
sources:
  - https://www.demandbase.com/pricing/
  - https://developer.demandbase.com/
principles:
  - name: Visibility
    description: Track Demandbase platform spend per package (One / Advertising / Data) and per-seat counts
      via the customer admin console; reconcile media spend separately for advertising campaigns.
  - name: Allocation
    description: Allocate platform spend across go-to-market teams (sales, marketing) based on seat ownership;
      allocate ad spend by campaign to brand or product owners.
  - name: Optimization
    description: Right-size active platform seats quarterly, prune inactive users, consolidate ad campaigns
      and audiences, and audit data export / import volume to avoid over-provisioning data licenses.
  - name: Accountability
    description: Marketing operations owns platform-fee renewal; advertising owns media spend; data ops
      owns data-license consumption. Establish a quarterly review against contract entitlements.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - Invoicing and Chargeback
      - Onboarding Workloads
billingModel:
  pricingCategory: SaaS Subscription (Platform Fee + Per-User) + Media Pass-Through
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Demandbase
  ServiceCategory: B2B Marketing / Sales Intelligence
  ProviderName: Demandbase
  PublisherName: Demandbase, Inc.
  InvoiceIssuerName: Demandbase, Inc.
  PricingCategory: Subscription
  PricingUnit: seat
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: platform_fee
    description: Annual platform fee per Demandbase package
    unit: month
    aggregation: sum
    dimensions:
      - subscription
      - package
  - name: user_seats
    description: Active platform users
    unit: seat
    aggregation: max
    dimensions:
      - subscription
      - package
  - name: media_spend
    description: Advertising media spend running through Demandbase Advertising
    unit: USD
    aggregation: sum
    dimensions:
      - campaign
      - audience
  - name: data_license
    description: Demandbase Data records consumed via export / import / enrichment
    unit: record
    aggregation: sum
    dimensions:
      - subscription
